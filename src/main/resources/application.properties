# ============================================================
#  Configuration de l'application GestionBibliotheque
# ============================================================

spring.application.name=GestionBibliotheque

# Port : utilise la variable PORT fournie par l'hebergeur (Render),
# sinon 8081 en local.
server.port=${PORT:8081}

# ---------- Base de donnees MySQL ----------
# En local : valeurs par defaut (XAMPP, root sans mot de passe).
# En production : definir les variables d'environnement
#   SPRING_DATASOURCE_URL, SPRING_DATASOURCE_USERNAME, SPRING_DATASOURCE_PASSWORD
# dans le tableau de bord de l'hebergeur (voir DEPLOIEMENT.md).
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/bibliotheque_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ---------- JPA / Hibernate ----------
# update : conserve les donnees entre les redemarrages.
# Mettre "create-drop" temporairement si vous voulez injecter data.sql (voir README).
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=true

# ---------- Donnees de demonstration (data.sql) ----------
# Desactive par defaut pour ne pas dupliquer les donnees a chaque demarrage.
# Pour charger data.sql : passer cette valeur a "always" ET ddl-auto a "create-drop".
spring.sql.init.mode=never
spring.jpa.defer-datasource-initialization=true

# ---------- Thymeleaf ----------
spring.thymeleaf.cache=false

# ---------- Encodage ----------
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true
