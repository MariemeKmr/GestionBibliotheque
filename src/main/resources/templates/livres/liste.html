<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head th:replace="~{fragments/layout :: head('Livres')}"></head>
<body>

<nav th:replace="~{fragments/layout :: navbar}"></nav>

<main class="container">

    <div class="page-header">
        <h1>
            <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                 stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path>
                <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path>
            </svg>
            Gestion des livres
        </h1>
        <a class="btn btn-primaire" th:href="@{/livres/nouveau}">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                 stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line>
            </svg>
            Ajouter un livre
        </a>
    </div>

    <th:block th:replace="~{fragments/layout :: alertes}"></th:block>

    <div class="table-wrap">
        <table>
            <thead>
            <tr>
                <th>Titre</th>
                <th>Auteur</th>
                <th>Categorie</th>
                <th>Annee</th>
                <th>Disponibilite</th>
                <th>Statut</th>
                <th style="text-align:right;">Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:if="${livres.isEmpty()}">
                <td colspan="7" class="vide">Aucun livre enregistre pour le moment.</td>
            </tr>
            <tr th:each="livre : ${livres}">
                <td th:text="${livre.titre}" style="font-weight:600;">Titre</td>
                <td th:text="${livre.auteur}">Auteur</td>
                <td th:text="${livre.categorie != null and !livre.categorie.isEmpty()} ? ${livre.categorie} : '—'">Categorie</td>
                <td th:text="${livre.anneePublication != null} ? ${livre.anneePublication} : '—'">Annee</td>
                <td>
                    <span th:text="${livre.quantiteDisponible} + ' / ' + ${livre.quantiteTotale}">0 / 0</span>
                </td>
                <td>
                    <span th:if="${livre.disponible}" class="badge badge-vert">Disponible</span>
                    <span th:unless="${livre.disponible}" class="badge badge-rouge">Emprunte</span>
                </td>
                <td>
                    <div class="actions-cellule" style="justify-content:flex-end;">
                        <a class="btn btn-secondaire btn-sm" th:href="@{/livres/{id}/modifier(id=${livre.id})}">Modifier</a>
                        <form th:action="@{/livres/{id}/supprimer(id=${livre.id})}" method="post"
                              onsubmit="return confirm('Supprimer ce livre ?');" style="display:inline;">
                            <button type="submit" class="btn btn-danger btn-sm">Supprimer</button>
                        </form>
                    </div>
                </td>
            </tr>
            </tbody>
        </table>
    </div>

</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
