<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head th:replace="~{fragments/layout :: head('Livre')}"></head>
<body>

<nav th:replace="~{fragments/layout :: navbar}"></nav>

<main class="container">

    <div class="page-header">
        <h1>
            <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                 stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path>
                <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path>
            </svg>
            <span th:text="${livre.id == null} ? 'Ajouter un livre' : 'Modifier le livre'">Livre</span>
        </h1>
        <a class="btn btn-secondaire" th:href="@{/livres}">Retour a la liste</a>
    </div>

    <div class="card">
        <form th:action="@{/livres/enregistrer}" th:object="${livre}" method="post">
            <input type="hidden" th:field="*{id}">
            <input type="hidden" th:field="*{quantiteDisponible}">

            <div class="form-grid">
                <div class="form-groupe pleine-largeur">
                    <label for="titre">Titre</label>
                    <input type="text" id="titre" th:field="*{titre}" placeholder="Ex : Une si longue lettre">
                    <span class="erreur-champ" th:if="${#fields.hasErrors('titre')}" th:errors="*{titre}"></span>
                </div>

                <div class="form-groupe">
                    <label for="auteur">Auteur</label>
                    <input type="text" id="auteur" th:field="*{auteur}" placeholder="Ex : Mariama Ba">
                    <span class="erreur-champ" th:if="${#fields.hasErrors('auteur')}" th:errors="*{auteur}"></span>
                </div>

                <div class="form-groupe">
                    <label for="categorie">Categorie</label>
                    <input type="text" id="categorie" th:field="*{categorie}" placeholder="Ex : Roman">
                </div>

                <div class="form-groupe">
                    <label for="isbn">ISBN</label>
                    <input type="text" id="isbn" th:field="*{isbn}" placeholder="Ex : 978-...">
                </div>

                <div class="form-groupe">
                    <label for="anneePublication">Annee de publication</label>
                    <input type="number" id="anneePublication" th:field="*{anneePublication}" placeholder="Ex : 1979">
                    <span class="erreur-champ" th:if="${#fields.hasErrors('anneePublication')}" th:errors="*{anneePublication}"></span>
                </div>

                <div class="form-groupe">
                    <label for="quantiteTotale">Nombre d'exemplaires</label>
                    <input type="number" id="quantiteTotale" th:field="*{quantiteTotale}" min="1" value="1">
                    <span class="erreur-champ" th:if="${#fields.hasErrors('quantiteTotale')}" th:errors="*{quantiteTotale}"></span>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primaire">Enregistrer</button>
                    <a class="btn btn-secondaire" th:href="@{/livres}">Annuler</a>
                </div>
            </div>
        </form>
    </div>

</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
