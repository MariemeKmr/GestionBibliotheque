<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head th:replace="~{fragments/layout :: head('Utilisateurs')}"></head>
<body>

<nav th:replace="~{fragments/layout :: navbar}"></nav>

<main class="container">

    <div class="page-header">
        <h1>
            <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                 stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"></path>
                <circle cx="9" cy="7" r="4"></circle>
                <path d="M22 21v-2a4 4 0 0 0-3-3.87"></path>
            </svg>
            Gestion des utilisateurs
        </h1>
        <a class="btn btn-primaire" th:href="@{/utilisateurs/nouveau}">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                 stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line>
            </svg>
            Ajouter un utilisateur
        </a>
    </div>

    <th:block th:replace="~{fragments/layout :: alertes}"></th:block>

    <div class="table-wrap">
        <table>
            <thead>
            <tr>
                <th>Nom complet</th>
                <th>Email</th>
                <th>Telephone</th>
            </tr>
            </thead>
            <tbody>
            <tr th:if="${utilisateurs.isEmpty()}">
                <td colspan="3" class="vide">Aucun utilisateur enregistre pour le moment.</td>
            </tr>
            <tr th:each="u : ${utilisateurs}">
                <td th:text="${u.nomComplet}" style="font-weight:600;">Nom</td>
                <td th:text="${u.email}">email</td>
                <td th:text="${u.telephone != null and !u.telephone.isEmpty()} ? ${u.telephone} : '—'">tel</td>
            </tr>
            </tbody>
        </table>
    </div>

</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
