<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head th:fragment="head(titre)">
    <!-- Fragment : en-tete commun -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${titre} + ' - Bibliotheque'">Bibliotheque</title>
    <!-- Icone de l'onglet (favicon) -->
    <link rel="icon" type="image/svg+xml" th:href="@{/favicon.svg}">
    <link rel="icon" type="image/png" sizes="32x32" th:href="@{/favicon-32.png}">
    <link rel="alternate icon" type="image/x-icon" th:href="@{/favicon.ico}">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<!-- ============ Fragment : barre de navigation ============ -->
<nav class="navbar" th:fragment="navbar">
    <a class="brand" th:href="@{/}">
        <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path>
            <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path>
        </svg>
        <span>Ma Bibliotheque</span>
    </a>
    <ul class="nav-links">
        <li>
            <a th:href="@{/}" th:classappend="${page == 'accueil'} ? 'actif'">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                     stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                    <polyline points="9 22 9 12 15 12 15 22"></polyline>
                </svg>
                Accueil
            </a>
        </li>
        <li>
            <a th:href="@{/livres}" th:classappend="${page == 'livres'} ? 'actif'">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                     stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path>
                    <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path>
                </svg>
                Livres
            </a>
        </li>
        <li>
            <a th:href="@{/utilisateurs}" th:classappend="${page == 'utilisateurs'} ? 'actif'">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                     stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"></path>
                    <circle cx="9" cy="7" r="4"></circle>
                    <path d="M22 21v-2a4 4 0 0 0-3-3.87"></path>
                    <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
                </svg>
                Utilisateurs
            </a>
        </li>
        <li>
            <a th:href="@{/emprunts}" th:classappend="${page == 'emprunts'} ? 'actif'">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                     stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M16.5 9.4 7.5 4.21"></path>
                    <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path>
                    <polyline points="3.29 7 12 12 20.71 7"></polyline>
                    <line x1="12" y1="22" x2="12" y2="12"></line>
                </svg>
                Emprunts
            </a>
        </li>
    </ul>
</nav>

<!-- ============ Fragment : messages flash ============ -->
<th:block th:fragment="alertes">
    <div class="alerte alerte-succes" th:if="${succes}">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
            <polyline points="22 4 12 14.01 9 11.01"></polyline>
        </svg>
        <span th:text="${succes}"></span>
    </div>
    <div class="alerte alerte-erreur" th:if="${erreur}">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"></circle>
            <line x1="12" y1="8" x2="12" y2="12"></line>
            <line x1="12" y1="16" x2="12.01" y2="16"></line>
        </svg>
        <span th:text="${erreur}"></span>
    </div>
</th:block>

<!-- ============ Fragment : pied de page ============ -->
<footer class="footer" th:fragment="footer">
    <span>Gestion de Bibliotheque</span>
    &middot;
    <span>Marieme KAMARA</span>
    &middot;
    <span th:text="${T(java.time.Year).now()}">2026</span>
</footer>

</body>
</html>
